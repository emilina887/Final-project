<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/details.css">
    <link rel="stylesheet" href="../style/details_adaptive.css">
    <title>Сторінка товару</title>
</head>
<body>
    <header class="catalog-header">
        <div class="header-top">
            <div class="logo-placeholder">
                <img src="../assets/photos/logo.jfif" alt="Logo">
            </div>
            <h1>PeachDish</h1>
            <div class="spacer"></div>
        </div>

        <nav>
            <a href="../index.html">Головна</a>
            <a href="../index.html">Про нас</a>
            <a href="../index.html">Контакти</a>
        </nav>
    </header>

    <div class="wrapper">
        <a href="./catalog-cutlery.html" class="back-btn">← Повернутися назад</a>

        <main class="product-main">
            <img class="photo-box" src="../assets/photos/cultlery/ложкивилки.png" alt="ложки вилки">
            
            <div class="info-box">
                <h1>Ложки та Виделки</h1>
                <p>Вишуканий набір вінтажних посріблених столових приборів із витонченим рослинним візерунком</p>
                <div class="price-btn">229 грн</div>
            </div>
        </main>

        <section class="reviews">
            <h2>Відгуки покупців</h2>
            
            <div class="review-card">
                <strong>
                    <img class="author-icon" src="../assets/photos/avatar.jpg" alt="Avatar" class="author-icon"> 
                    Оксана:
                </strong>
                <p>Якісні, хороші</p>
            </div>
            
            <div class="review-card">
                <strong>
                    <img class="author-icon" src="../assets/photos/avatar.jpg" alt="Avatar" class="author-icon"> 
                   Єва:
                </strong>
                <p>Купляйте! чудова цінна</p>
            </div>
        </section>
    </div>

    <footer>
        <p>© 2026 PeachDish. Всі права захищені.</p>
    </footer>

</body>
</html>
